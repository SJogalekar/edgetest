# This workflow publishes the package to pypi.
# For more details:
# https://docs.github.com/en/actions/guides/building-and-testing-python#publishing-to-package-registries
name: Publish

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # pin@v2.7.0
      with:
        # fetch all tags so `versioneer` can properly determine current version
        fetch-depth: 0
    - name: Install uv and set the Python version
      uses: astral-sh/setup-uv@v7
      with:
          python-version: '3.10'
    - name: Install dependencies
      run: uv sync --locked --all-extras --dev
    - name: Build and publish
      run: uv build
    - name: Publish
      run: uv publish
